# Dependabot version updates. Security updates (the alerts) are a separate repo
# setting and stay on; this keeps dependencies current and groups routine bumps
# into a few PRs instead of one per package.
version: 2
updates:
  # JavaScript / TypeScript -- the pnpm workspace (gateway, dashboard, evals, and
  # the napi package). Globs cover apps/* and crates/*; the root has no deps.
  - package-ecosystem: "npm"
    directories:
      - "/apps/*"
      - "/evals"
      - "/crates/*"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # React and its type packages travel together so a React major lands as one
      # buildable PR (bumping react without @types/react breaks the typecheck).
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      # Everything else batched by dependency type -- including majors -- so a scan
      # produces a few PRs to review, not one per package.
      development:
        dependency-type: "development"
      production:
        dependency-type: "production"
    ignore:
      # @types/node tracks the Node LTS line CI runs on (setup-node lts/*), so
      # majors beyond current LTS are skipped; bump it by hand when LTS moves.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"

  # Rust detection core (Cargo workspace at the repo root).
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      cargo:
        patterns: ["*"]
    commit-message:
      prefix: "deps"

  # GitHub Actions -- keep the SHA-pinned actions in ci.yml current (Dependabot
  # bumps the pin and its version comment together).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci"
