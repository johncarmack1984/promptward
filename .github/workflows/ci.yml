name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # pnpm version is read from the packageManager field in package.json
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build detection core (napi addon)
        run: pnpm core:build

      - name: Rust unit tests
        run: cargo test -p tripwire-core

      - name: Eval (gated on detection floor)
        run: pnpm eval

      - name: Gateway typecheck
        run: pnpm --filter @promptward/gateway typecheck

      - name: Gateway tests
        run: pnpm --filter @promptward/gateway test

      - name: Dashboard build
        run: pnpm --filter @promptward/dashboard build
