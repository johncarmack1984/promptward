name: ci

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the build only needs to read the repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # pnpm version is read from the packageManager field in package.json
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 'lts/*'
          cache: pnpm

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0

      - name: Install
        # Dependabot bumps package.json but does not regenerate pnpm-lock.yaml,
        # so --frozen-lockfile would fail on its PRs. Keep it strict for human
        # PRs; relax it for Dependabot only (CI still installs the bumped deps).
        run: pnpm install ${{ github.actor == 'dependabot[bot]' && '--no-frozen-lockfile' || '--frozen-lockfile' }}

      - name: Format gate (biome)
        run: pnpm exec biome check .

      - name: Build detection core (napi addon)
        run: pnpm core:build

      - name: rustfmt (check)
        run: cargo fmt --all --check
      - name: Clippy (zero warnings)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Rust unit tests
        run: cargo test -p tripwire-core --locked

      - name: Eval (gated on detection floor)
        run: pnpm eval

      # Guards the "every number is from a real run" claim: the committed
      # artifact's deterministic detection metrics must match a fresh run.
      # Compares metrics only (not the nondeterministic perf timings).
      - name: Detection metrics are committed and current
        run: |
          node -e '
            const fs = require("node:fs");
            const cp = require("node:child_process");
            const fresh = JSON.parse(fs.readFileSync("evals/results.json", "utf8")).metrics;
            const head = JSON.parse(cp.execSync("git show HEAD:evals/results.json", { encoding: "utf8" })).metrics;
            if (JSON.stringify(fresh) !== JSON.stringify(head)) {
              console.error("evals/results.json detection metrics are stale -- run pnpm eval and commit the result.");
              process.exit(1);
            }
            console.log("detection metrics current");
          '

      - name: Typecheck (all packages)
        run: pnpm -r --if-present typecheck

      - name: Gateway tests
        run: pnpm --filter @promptward/gateway test

      - name: Dashboard build
        run: pnpm --filter @promptward/dashboard build

  deny:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          command: check advisories bans licenses sources
