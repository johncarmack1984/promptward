name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build detection core (napi addon)
        run: pnpm core:build

      - name: Rust unit tests
        run: cargo test -p tripwire-core

      - name: Eval (gated on detection floor)
        run: pnpm eval

      - name: Gateway typecheck
        run: pnpm --filter @promptward/gateway typecheck

      - name: Gateway tests
        run: pnpm --filter @promptward/gateway test

      - name: Dashboard build
        run: pnpm --filter @promptward/dashboard build
